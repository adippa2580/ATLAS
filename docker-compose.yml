services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - '5432:5432'
    volumes:
      - atlas_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  # The Atlas monolith. Comment out to run the app on the host with `npm run start:dev`.
  atlas:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas?schema=public
      REDIS_URL: redis://redis:6379
      EVIDENCE_BUS: memory
      DEV_TRUST_HEADERS: 'true'
      NODE_ENV: development
      PORT: '3000'
    ports:
      - '3000:3000'
    profiles: ['full']

volumes:
  atlas_pg:
