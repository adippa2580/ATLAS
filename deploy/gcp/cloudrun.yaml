# Cloud Run service for the Atlas monolith (project atlas-502319).
# The deploy script substitutes __REGION__, __PROJECT_ID__, __IMAGE_TAG__ and
# __SQL_CONNECTION_NAME__ before `gcloud run services replace`.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: atlas
  labels:
    app: atlas
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/vpc-access-connector: atlas-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
        # Cloud SQL socket mount for the Postgres connector.
        run.googleapis.com/cloudsql-instances: __SQL_CONNECTION_NAME__
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '20'
    spec:
      serviceAccountName: atlas-run@__PROJECT_ID__.iam.gserviceaccount.com
      containerConcurrency: 80
      containers:
        - image: __REGION__-docker.pkg.dev/__PROJECT_ID__/atlas/atlas:__IMAGE_TAG__
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: EVIDENCE_BUS
              value: pubsub
            - name: DEV_TRUST_HEADERS
              value: 'false'
            - name: GCP_PROJECT_ID
              value: __PROJECT_ID__
            - name: SPOTIFY_CLIENT_ID
              value: 38b7964e801c4955a90895a2766e7ea3
            - name: SPOTIFY_REDIRECT_URL
              value: https://atlas-4je5vwjoha-uc.a.run.app/v1/connectors/spotify/callback
            - name: SPOTIFY_CLIENT_SECRET
              value: '__SPOTIFY_CLIENT_SECRET__'
            # Eventbrite demand connector. Empty (no repo secret) → adapter stays
            # in STUB mode; set the EVENTBRITE_API_TOKEN repo secret to go live.
            - name: EVENTBRITE_API_TOKEN
              value: '__EVENTBRITE_API_TOKEN__'
            - name: ALIST_FEED_URL
              value: https://ofjcnikfebfgopytsgbm.supabase.co
            - name: ALIST_FEED_KEY
              value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mamNuaWtmZWJmZ29weXRzZ2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NzE5MjAsImV4cCI6MjA3NjU0NzkyMH0.Dpu4Xh2ho8zbi7lnDoSxXfVw5ZbxJBu8evqkOxI6WGE
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atlas-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: atlas-redis-url
                  key: latest
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
