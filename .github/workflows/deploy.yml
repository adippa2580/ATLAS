name: Deploy (Cloud Run)

# Deploys the Atlas monolith to Cloud Run on push to main, authenticating to GCP
# via Workload Identity Federation (no long-lived keys). Configure repo-level:
#   Variables: GCP_PROJECT_ID, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOY_SA
# (all output by `terraform apply` — see deploy/gcp/README.md).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race the migrate + service-replace against the same
# instance. Queue them instead of cancelling — a half-applied migration is worse
# than a slow pipeline.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for WIF OIDC

jobs:
  # Gate: a broken build/lint/test must block the deploy. Mirrors ci.yml so a
  # push that fails tests never reaches Cloud Run even if `docker build` succeeds.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas?schema=public
      EVIDENCE_BUS: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm run build
      - run: npm run lint
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      # Self-provision the data infrastructure (Cloud SQL, Redis, Pub/Sub, VPC
      # connector, Artifact Registry, BigQuery, Secret Manager) via Terraform,
      # mirroring deploy/gcp/cloudshell-deploy.sh: enable APIs, ensure the GCS
      # state bucket, init, adopt any pre-existing resources into state (so apply
      # reconciles instead of hitting 409), then apply. Idempotent + safe to
      # re-run. Cloud SQL creation is slow (~10-15 min on first provision).
      #
      # ONE-TIME SETUP required before this can run:
      #   1. Set the repo secret GCP_DB_PASSWORD (used on first provision; after
      #      that the password is reused from Secret Manager `atlas-db-password`).
      #   2. Grant the deploy service account (GCP_DEPLOY_SA) permission to create
      #      the infra. Simplest: roles/owner. Least-privilege alternative:
      #        roles/cloudsql.admin, roles/redis.admin, roles/pubsub.admin,
      #        roles/bigquery.admin, roles/artifactregistry.admin,
      #        roles/secretmanager.admin, roles/compute.networkAdmin,
      #        roles/vpcaccess.admin, roles/storage.admin,
      #        roles/serviceusage.serviceUsageAdmin, roles/iam.serviceAccountAdmin,
      #        roles/resourcemanager.projectIamAdmin,
      #        roles/iam.workloadIdentityPoolAdmin
      #      e.g.  gcloud projects add-iam-policy-binding "$PROJECT_ID" \
      #              --member="serviceAccount:$GCP_DEPLOY_SA" --role=roles/owner
      - name: Provision infrastructure (Terraform)
        env:
          DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
        run: |
          export TF_VAR_project_id="$PROJECT_ID" TF_VAR_region="$REGION"
          # DB password: repo secret on first provision, else reuse Secret Manager.
          if [ -n "${DB_PASSWORD}" ]; then
            export TF_VAR_db_password="${DB_PASSWORD}"
          elif gcloud secrets versions access latest --secret=atlas-db-password >/dev/null 2>&1; then
            export TF_VAR_db_password="$(gcloud secrets versions access latest --secret=atlas-db-password)"
          else
            echo "::error::First-time provision needs the GCP_DB_PASSWORD repo secret (or an existing atlas-db-password secret)."
            exit 1
          fi
          gcloud services enable \
            cloudresourcemanager.googleapis.com serviceusage.googleapis.com \
            run.googleapis.com sqladmin.googleapis.com redis.googleapis.com \
            pubsub.googleapis.com bigquery.googleapis.com artifactregistry.googleapis.com \
            secretmanager.googleapis.com vpcaccess.googleapis.com iamcredentials.googleapis.com \
            cloudbuild.googleapis.com iam.googleapis.com --project "$PROJECT_ID" \
            || { echo "::error::Could not enable APIs — confirm billing + the deploy SA has serviceusage/owner."; exit 1; }
          gcloud storage buckets create "gs://${PROJECT_ID}-tfstate" \
            --location="$REGION" --uniform-bucket-level-access >/dev/null 2>&1 || true
          cd deploy/gcp/terraform
          terraform init -input=false -reconfigure \
            || { echo "::error::terraform init failed (state bucket access?)."; exit 1; }
          # Adopt pre-existing resources into state (tolerant: skip if tracked, no-op if absent).
          adopt() {
            if terraform state list 2>/dev/null | grep -qxF "$1"; then return 0; fi
            terraform import -input=false "$1" "$2" >/dev/null 2>&1 || true
            return 0
          }
          P="$PROJECT_ID"
          adopt google_service_account.atlas_run    "projects/${P}/serviceAccounts/atlas-run@${P}.iam.gserviceaccount.com"
          adopt google_service_account.github_deploy "projects/${P}/serviceAccounts/atlas-github-deploy@${P}.iam.gserviceaccount.com"
          adopt google_storage_bucket.lake          "${P}-atlas-lake"
          adopt google_bigquery_dataset.atlas       "projects/${P}/datasets/atlas_bi"
          adopt google_artifact_registry_repository.atlas "projects/${P}/locations/${REGION}/repositories/atlas"
          adopt google_redis_instance.atlas         "projects/${P}/locations/${REGION}/instances/atlas-redis"
          adopt google_pubsub_topic.evidence        "projects/${P}/topics/atlas-evidence"
          adopt google_pubsub_subscription.evidence_recompute "projects/${P}/subscriptions/atlas-evidence-recompute"
          adopt google_vpc_access_connector.atlas   "projects/${P}/locations/${REGION}/connectors/atlas-connector"
          adopt google_secret_manager_secret.database_url "projects/${P}/secrets/atlas-database-url"
          adopt google_secret_manager_secret.redis_url    "projects/${P}/secrets/atlas-redis-url"
          adopt google_iam_workload_identity_pool.github  "projects/${P}/locations/global/workloadIdentityPools/atlas-github"
          adopt google_iam_workload_identity_pool_provider.github "projects/${P}/locations/global/workloadIdentityPools/atlas-github/providers/github-oidc"
          adopt google_sql_database_instance.atlas  "${P}/atlas-pg"
          terraform apply -input=false -auto-approve \
            || { echo "retrying apply after transient errors..."; sleep 30; \
                 terraform apply -input=false -auto-approve \
                   || { echo "::error::terraform apply failed — see the Error above."; exit 1; }; }
          # Persist the DB password so future runs reuse it without the repo secret.
          gcloud secrets describe atlas-db-password >/dev/null 2>&1 \
            || printf '%s' "${TF_VAR_db_password}" | gcloud secrets create atlas-db-password --data-file=- >/dev/null 2>&1 || true

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/atlas/atlas:${GITHUB_SHA::7}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" -q
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Migrate database
        run: |
          SQL_CONN="$(gcloud sql instances describe atlas-pg --format='value(connectionName)')"
          # Self-heal a previously-failed 0003 (rolled-back is a no-op on a
          # migration that isn't in a failed state), then apply. On failure, dump
          # the job's Cloud Logging so the real Prisma error is visible here.
          gcloud run jobs deploy atlas-migrate \
            --image "$IMAGE" --region "$REGION" \
            --service-account "atlas-run@${PROJECT_ID}.iam.gserviceaccount.com" \
            --set-cloudsql-instances "$SQL_CONN" \
            --set-secrets "DATABASE_URL=atlas-database-url:latest" \
            --command sh \
            --args '-c,for m in 0002_p0_hardening 0003_insights_unlocks; do npx prisma migrate resolve --rolled-back $m 2>/dev/null || true; done; npx prisma migrate deploy' \
            --quiet
          gcloud run jobs execute atlas-migrate --region "$REGION" --wait \
            || { echo "::group::atlas-migrate execution logs"; \
                 gcloud logging read "resource.type=cloud_run_job AND resource.labels.job_name=atlas-migrate" \
                   --project "$PROJECT_ID" --limit=80 --freshness=1h \
                   --format='value(textPayload)' 2>/dev/null || true; \
                 echo "::endgroup::"; exit 1; }

      - name: Seed demo dataset
        run: |
          SQL_CONN="$(gcloud sql instances describe atlas-pg --format='value(connectionName)')"
          gcloud run jobs deploy atlas-seed \
            --image "$IMAGE" --region "$REGION" \
            --service-account "atlas-run@${PROJECT_ID}.iam.gserviceaccount.com" \
            --set-cloudsql-instances "$SQL_CONN" \
            --set-secrets "DATABASE_URL=atlas-database-url:latest" \
            --command node --args "prisma/seed.mjs" --quiet
          gcloud run jobs execute atlas-seed --region "$REGION" --wait

      - name: Deploy service
        env:
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Optional: set the EVENTBRITE_API_TOKEN repo secret to flip the
          # Eventbrite demand connector from stub → live. Unset renders empty,
          # so the adapter stays in STUB mode (safe to wire ahead of the token).
          EVENTBRITE_API_TOKEN: ${{ secrets.EVENTBRITE_API_TOKEN }}
          # Optional: set the KLAVIYO_API_KEY repo secret to flip the Klaviyo
          # delivery rail from stub → live. Unset renders empty, so the adapter
          # stays in STUB mode (safe to wire ahead of the key).
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          # Apple Music: Team ID + Key ID are non-secret and hardcoded in
          # cloudrun.yaml. Only the .p8 private key is a secret — accepted under
          # either APPLE_MUSIC_PRIVATE_KEY or the shorter APPLE_MUSIC_KEY.
          APPLE_MUSIC_PRIVATE_KEY: ${{ secrets.APPLE_MUSIC_PRIVATE_KEY || secrets.APPLE_MUSIC_KEY }}
          # SoundCloud (optional; stays stub unless both are set).
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          # Concerts artist-events sources (optional; stub until set).
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
        run: |
          SQL_CONN="$(gcloud sql instances describe atlas-pg --format='value(connectionName)')"
          # Normalise the Apple Music .p8 to single-line base64 so it is sed-safe
          # (a raw PEM has newlines that would break the render). Accepts either
          # a raw PEM or an already-base64 secret; the app decodes base64 at load.
          if printf '%s' "${APPLE_MUSIC_PRIVATE_KEY}" | grep -q "BEGIN"; then
            APPLE_MUSIC_PRIVATE_KEY="$(printf '%s' "${APPLE_MUSIC_PRIVATE_KEY}" | base64 -w0)"
          fi
          sed -e "s/__REGION__/${REGION}/g" \
              -e "s/__PROJECT_ID__/${PROJECT_ID}/g" \
              -e "s/__IMAGE_TAG__/${GITHUB_SHA::7}/g" \
              -e "s#__SQL_CONNECTION_NAME__#${SQL_CONN}#g" \
              -e "s#__SPOTIFY_CLIENT_SECRET__#${SPOTIFY_CLIENT_SECRET}#g" \
              -e "s#__EVENTBRITE_API_TOKEN__#${EVENTBRITE_API_TOKEN}#g" \
              -e "s#__KLAVIYO_API_KEY__#${KLAVIYO_API_KEY}#g" \
              -e "s#__APPLE_MUSIC_PRIVATE_KEY__#${APPLE_MUSIC_PRIVATE_KEY}#g" \
              -e "s#__SOUNDCLOUD_CLIENT_ID__#${SOUNDCLOUD_CLIENT_ID}#g" \
              -e "s#__SOUNDCLOUD_CLIENT_SECRET__#${SOUNDCLOUD_CLIENT_SECRET}#g" \
              -e "s#__TICKETMASTER_API_KEY__#${TICKETMASTER_API_KEY}#g" \
              -e "s#__BANDSINTOWN_APP_ID__#${BANDSINTOWN_APP_ID}#g" \
              deploy/gcp/cloudrun.yaml > /tmp/cloudrun.rendered.yaml
          gcloud run services replace /tmp/cloudrun.rendered.yaml --region "$REGION"
