<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas Ops Console</title>
<style>
:root{
  --s0:#04050A; --s1:#0B0E17; --s2:#111524;
  --hi:#F5F7FF; --mid:#B8C0D4; --lo:#6B7280;
  --violet:#A78BFA; --cyan:#22D3EE; --electric:#60A5FA; --amber:#FBBF24;
  --mint:#34D399;
  --pc-taste:#c55285; --pc-identity:#933e92; --pc-crews:#6f52b9;
  --pc-venues:#129db0; --pc-bookings:#618aeb; --pc-revenue:#b48706; --pc-marketing:#ac4b06;
  --mono:Menlo,Monaco,"SF Mono",monospace;
  --sans:"Helvetica Neue",Helvetica,Arial,sans-serif;
  --glass-fill:rgba(255,255,255,.055);
  --glass-line:rgba(255,255,255,.11);
  --card-line:rgba(255,255,255,.08);
  --row-line:rgba(255,255,255,.05);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--s0); color:var(--mid);
  font-family:var(--sans); font-weight:300;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-top:34px;
}
:focus-visible{outline:2px solid var(--cyan); outline-offset:2px}
button{font-family:inherit; cursor:pointer; color:inherit; background:none; border:none}
.mono{font-family:var(--mono)}
.kick{font-family:var(--mono); text-transform:uppercase; letter-spacing:.22em; color:var(--lo); font-size:10px}

/* back link */
.backlink{
  position:fixed; top:0; left:0; right:0; height:34px; z-index:60;
  display:flex; align-items:center; padding:0 18px;
  font-family:var(--mono); font-size:10.5px; letter-spacing:.24em; text-transform:uppercase;
  color:var(--lo); text-decoration:none;
  background:rgba(4,5,10,.86); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--card-line);
}
.backlink:hover{color:var(--mid)}

/* shell */
.shell{display:flex; min-height:calc(100vh - 34px)}

/* ── NAV RAIL ── */
.rail{
  width:190px; flex:0 0 190px; align-self:stretch;
  position:sticky; top:34px; height:calc(100vh - 34px);
  display:flex; flex-direction:column;
  background:var(--glass-fill); backdrop-filter:blur(12px);
  border-right:1px solid var(--glass-line);
  padding:20px 0 0;
}
.rail-brand{padding:0 18px 18px}
.rail-brand .wm{font-size:15px; color:var(--hi); font-weight:300; letter-spacing:.02em}
.rail-brand .sub{margin-top:5px}
.scenario{padding:0 14px 16px}
.scenario .lbl{padding:0 4px 7px; font-size:9px; letter-spacing:.24em}
.seg{display:flex; background:var(--s2); border:1px solid var(--card-line); border-radius:8px; padding:3px}
.seg button{flex:1; padding:7px 0; border-radius:6px; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--lo); transition:background .12s ease,color .12s ease}
.seg button[aria-pressed="true"]{background:rgba(96,165,250,.16); color:var(--electric)}
.rail-nav{padding:6px 0; flex:0 0 auto}
.navitem{
  position:relative; width:100%; text-align:left;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px 12px 16px; border-left:3px solid transparent;
  color:var(--mid); transition:background .12s ease,color .12s ease;
}
.navitem:hover{background:rgba(255,255,255,.03)}
.navitem[aria-current="true"]{border-left-color:var(--violet); background:rgba(167,139,250,.08); color:var(--hi)}
.navitem .nm{font-size:13.5px}
.navitem .ct{font-family:var(--mono); font-size:11px; color:var(--lo)}
.navitem[aria-current="true"] .ct{color:var(--violet)}
.rail-foot{margin-top:auto; padding:16px 18px; border-top:1px solid var(--card-line)}
.rail-foot .venue{font-size:13px; color:var(--hi)}
.rail-foot .clock{margin-top:6px; font-family:var(--mono); font-size:11px; color:var(--mid); letter-spacing:.08em}
.rail-foot .clock .dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--mint); margin-right:6px; vertical-align:middle; animation:pulse 1.6s ease-in-out infinite}
.rail-foot.night .clock .dot{background:var(--lo); animation:none}

/* ── MAIN ── */
.main{flex:1 1 auto; min-width:0; display:flex; flex-direction:column}
.header{
  position:sticky; top:34px; z-index:40;
  display:flex; align-items:flex-end; justify-content:space-between; gap:24px;
  padding:20px 26px; background:var(--glass-fill); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-line);
}
.header .htitle{font-size:26px; font-weight:200; color:var(--hi); letter-spacing:-.01em; line-height:1}
.header .hkick{margin-top:9px}
.kpis{display:flex; gap:10px}
.kpi{min-width:104px; padding:10px 14px; background:rgba(255,255,255,.04); border:1px solid var(--card-line); border-radius:10px}
.kpi .kl{font-family:var(--mono); font-size:8.5px; letter-spacing:.2em; color:var(--lo); text-transform:uppercase}
.kpi .kv{margin-top:7px; font-family:var(--mono); font-size:17px; color:var(--hi)}
.kpi .kv.money{color:var(--electric)}

.content{padding:22px 26px 60px; flex:1 1 auto}

/* blocking banner */
.banner{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  background:var(--amber); color:#1a1206; border-radius:10px;
  padding:13px 16px; margin-bottom:20px;
}
.banner .bmsg{font-family:var(--mono); font-size:12px; letter-spacing:.02em; font-weight:400}
.banner .bmsg b{font-weight:700}
.banner .bactions{margin-left:auto; display:flex; gap:8px}
.banner button{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; padding:7px 12px; border-radius:7px}
.banner .breq{background:#1a1206; color:var(--amber)}
.banner .bdis{background:rgba(26,18,6,.16); color:#1a1206}
.banner button:focus-visible{outline-color:#1a1206}

/* ── FLOOR ── */
.floor-wrap{display:flex; gap:22px; align-items:flex-start}
.floor-main{flex:1 1 auto; min-width:0}
.floor-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px}
.tcard{
  text-align:left; background:var(--s1); border:1px solid rgba(107,114,128,.55);
  border-radius:11px; padding:14px; transition:border-color .12s ease, box-shadow .12s ease, transform .05s ease;
}
.tcard:hover{transform:translateY(-1px)}
.tcard:active{transform:translateY(0)}
.tcard.sel{outline:2px solid var(--cyan); outline-offset:2px}
.tcard.available{border-color:rgba(107,114,128,.55)}
.tcard.held{border-style:dashed; border-color:rgba(184,192,212,.55)}
.tcard.confirmed{border-color:rgba(34,211,238,.55)}
.tcard.seated{border-color:rgba(52,211,153,.55)}
.tcard.blocked{border-color:rgba(251,191,36,.55); background:rgba(251,191,36,.05)}
.tcard .trow{display:flex; align-items:center; justify-content:space-between; gap:8px}
.tcard .tid{font-family:var(--mono); font-size:14px; color:var(--hi); letter-spacing:.04em}
.tcard .tstate{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; white-space:nowrap}
.st-available{color:var(--lo)} .st-held{color:var(--mid)} .st-confirmed{color:var(--cyan)}
.st-seated{color:var(--mint)} .st-blocked{color:var(--amber)}
.tcard .tguest{margin-top:13px; font-size:14px; color:var(--hi)}
.tcard .tguest.empty{color:var(--lo)}
.tcard .tcap{margin-top:6px; font-family:var(--mono); font-size:10.5px; color:var(--lo)}

/* floor aside */
.aside{
  flex:0 0 330px; width:330px; background:var(--s1);
  border:1px solid var(--card-line); border-radius:12px; padding:18px;
}
.aside.empty{border-style:dashed; border-color:rgba(255,255,255,.14); background:transparent; text-align:center; padding:44px 20px; color:var(--lo)}
.aside .ahd{display:flex; align-items:center; justify-content:space-between}
.aside .aid{font-family:var(--mono); font-size:16px; color:var(--hi)}
.aside .aguest{margin-top:14px; font-size:20px; font-weight:300; color:var(--hi)}
.aside .ameta{margin-top:4px; font-family:var(--mono); font-size:11px; color:var(--mid)}
.detrows{margin-top:18px; border-top:1px solid var(--row-line)}
.detrow{display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--row-line)}
.detrow .dl{font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--lo)}
.detrow .dv{font-family:var(--mono); font-size:13px; color:var(--hi)}
.attrchip{display:inline-flex; align-items:center; padding:3px 9px 3px 8px; border-left:2px solid var(--amber); border-radius:0 5px 5px 0; background:rgba(255,255,255,.03); font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:var(--mid)}
.attrchip.guest{border-left-color:var(--mint)} .attrchip.ops{border-left-color:var(--violet)} .attrchip.marketing{border-left-color:var(--amber)}
.dots{display:inline-flex; gap:5px; align-items:center}
.dot{width:9px; height:9px; border-radius:50%; display:inline-block}
.dot.locked{background:var(--mint)}
.dot.pending{background:transparent; border:1.5px solid var(--lo); animation:pulse 1.6s ease-in-out infinite}
.dot.failed{background:var(--amber)}
.btn-seat{
  width:100%; margin-top:18px; padding:14px; border-radius:8px;
  background:var(--cyan); color:#04121a; font-size:16px; font-weight:500;
  transition:filter .12s ease, transform .05s ease;
}
.btn-seat:hover{filter:brightness(1.08)} .btn-seat:active{transform:scale(.99)}
.info-panel{margin-top:16px; border-radius:9px; padding:13px 14px; font-size:12.5px; line-height:1.55}
.info-panel .ip-lbl{font-family:var(--mono); font-size:9px; letter-spacing:.16em; text-transform:uppercase; margin-bottom:7px}
.info-panel.blocked{background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.3)}
.info-panel.blocked .ip-lbl{color:var(--amber)}
.info-panel.seated{background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.28)}
.info-panel.seated .ip-lbl{color:var(--mint)}
.info-panel .ip-btn{margin-top:10px; padding:8px 12px; border-radius:7px; background:rgba(251,191,36,.16); color:var(--amber); font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase}
.upnext{margin-top:22px}
.upnext .un-hd{font-family:var(--mono); font-size:9px; letter-spacing:.2em; color:var(--lo); text-transform:uppercase; margin-bottom:10px}
.un-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--row-line)}
.un-row .un-t{font-family:var(--mono); font-size:11px; color:var(--cyan); width:44px}
.un-row .un-g{font-size:13px; color:var(--hi); flex:1}
.un-row .un-p{font-family:var(--mono); font-size:10px; color:var(--lo)}

/* ── BOOKINGS ── */
.chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
.chip{display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:999px; background:var(--s1); border:1px solid var(--card-line); font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--mid); transition:background .12s,border-color .12s,color .12s}
.chip:hover{border-color:rgba(255,255,255,.2)}
.chip[aria-pressed="true"]{background:rgba(34,211,238,.12); border-color:rgba(34,211,238,.4); color:var(--cyan)}
.chip .cn{color:var(--lo)} .chip[aria-pressed="true"] .cn{color:var(--cyan)}
.board-wrap{overflow-x:auto; border:1px solid var(--card-line); border-radius:12px; background:var(--s1)}
.board{min-width:900px}
.brow{display:grid; grid-template-columns:64px 1.5fr 64px 1.2fr 1.2fr 130px 170px; align-items:center; gap:12px; padding:0 16px; height:52px; border-bottom:1px solid var(--row-line)}
.brow.head{height:38px; border-bottom:1px solid var(--card-line)}
.brow.head span{font-family:var(--mono); font-size:8.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--lo)}
.brow:last-child{border-bottom:none}
.b-time{font-family:var(--mono); font-size:12px; color:var(--mid)}
.b-guest{min-width:0; overflow:hidden}
.b-guest .g{font-size:14px; color:var(--hi); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.b-guest.cx .g{text-decoration:line-through; color:var(--lo)}
.b-guest .m{font-family:var(--mono); font-size:10px; color:var(--lo); margin-top:2px}
.b-min{font-family:var(--mono); font-size:12px; color:var(--mid)}
.b-pay{display:flex; align-items:center; gap:8px}
.b-pay .dep{font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; color:var(--mint)}
.b-pay .dep.no{color:var(--lo)}
.schip{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; white-space:nowrap}
.schip.held{border:1px dashed rgba(184,192,212,.5); color:var(--mid)}
.schip.confirmed{background:rgba(34,211,238,.12); color:var(--cyan)}
.schip.seated{background:rgba(52,211,153,.12); color:var(--mint)}
.schip.closed{background:rgba(107,114,128,.15); color:var(--lo)}
.schip.cancelled{background:rgba(107,114,128,.15); color:var(--lo)}
.schip .hd{width:7px; height:7px; border-radius:50%; border:1.5px solid var(--mid); animation:pulse 1.6s ease-in-out infinite}
.b-act{display:flex; gap:6px; justify-content:flex-end}
.b-act button{font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; padding:6px 10px; border-radius:6px; border:1px solid var(--card-line); color:var(--mid); transition:background .12s,border-color .12s,color .12s}
.b-act .ok{border-color:rgba(34,211,238,.35); color:var(--cyan)} .b-act .ok:hover{background:rgba(34,211,238,.12)}
.b-act .seat{border-color:rgba(52,211,153,.35); color:var(--mint)} .b-act .seat:hover{background:rgba(52,211,153,.12)}
.b-act .no{border-color:rgba(251,191,36,.3); color:var(--amber)} .b-act .no:hover{background:rgba(251,191,36,.12)}
.b-act .done{color:var(--lo); border-color:transparent; cursor:default}
.legend{margin-top:14px; font-family:var(--mono); font-size:10px; color:var(--lo); letter-spacing:.08em; display:flex; gap:16px; flex-wrap:wrap}
.legend span{display:inline-flex; align-items:center; gap:6px}
.legend .k{width:8px; height:8px; border-radius:50%}

/* ── DOOR ── */
.door-wrap{max-width:720px}
.scan-tile{
  width:100%; text-align:left; display:flex; align-items:center; gap:14px;
  background:rgba(34,211,238,.08); border:1px solid rgba(34,211,238,.28); border-radius:11px;
  padding:18px 20px; margin-bottom:18px; color:var(--cyan); font-size:17px; transition:background .12s}
.scan-tile:hover{background:rgba(34,211,238,.13)}
.scan-tile .gi{font-size:20px}
.door-search{width:100%; margin-bottom:16px; padding:13px 15px; background:var(--s2); border:1px solid var(--card-line); border-radius:8px; color:var(--hi); font-size:15px; font-family:var(--sans)}
.door-search::placeholder{color:var(--lo)}
.drow{display:flex; align-items:center; gap:14px; min-height:64px; padding:12px 4px; border-bottom:1px solid var(--row-line)}
.drow .dg{flex:1 1 auto; min-width:0}
.drow .dn{font-size:17px; color:var(--hi)}
.drow .dm{font-family:var(--mono); font-size:11px; color:var(--lo); margin-top:4px}
.flags{display:flex; gap:6px; flex-wrap:wrap}
.flagpill{padding:3px 9px; border-radius:999px; background:rgba(52,211,153,.12); color:var(--mint); font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; white-space:nowrap}
.btn-checkin{flex:0 0 auto; padding:12px 18px; border-radius:8px; background:rgba(34,211,238,.14); color:var(--cyan); border:1px solid rgba(34,211,238,.35); font-size:14px; transition:background .12s}
.btn-checkin:hover{background:rgba(34,211,238,.22)}
.checkedin{flex:0 0 auto; font-family:var(--mono); font-size:12px; color:var(--mint); letter-spacing:.06em; white-space:nowrap}

/* scan overlay */
.scrim{position:fixed; inset:0; z-index:80; background:rgba(4,5,10,.9); backdrop-filter:blur(6px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px}
.qr-target{position:relative; width:min(70vw,300px); height:min(70vw,300px); border:2px dashed rgba(34,211,238,.6); border-radius:18px; overflow:hidden}
.scanline{position:absolute; left:0; right:0; height:2px; background:var(--cyan); box-shadow:0 0 12px 2px rgba(34,211,238,.7); animation:scan 2s ease-in-out infinite}
.qr-corner{position:absolute; width:26px; height:26px; border:3px solid var(--cyan)}
.qr-corner.tl{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.qr-corner.tr{top:-1px;right:-1px;border-left:none;border-bottom:none;border-radius:0 6px 0 0}
.qr-corner.bl{bottom:-1px;left:-1px;border-right:none;border-top:none;border-radius:0 0 0 6px}
.qr-corner.br{bottom:-1px;right:-1px;border-left:none;border-top:none;border-radius:0 0 6px 0}
.scrim .stxt{font-family:var(--mono); font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--cyan)}
.scrim .shint{font-family:var(--mono); font-size:10px; letter-spacing:.16em; color:var(--lo)}

/* ── CLOSEOUT ── */
.co-kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px}
.co-kpi{background:var(--glass-fill); backdrop-filter:blur(12px); border:1px solid var(--glass-line); border-radius:12px; padding:18px}
.co-kpi .cl{font-family:var(--mono); font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--lo)}
.co-kpi .cv{margin-top:12px; font-family:var(--mono); font-size:26px; color:var(--hi); font-weight:300}
.co-kpi .cv.money{color:var(--electric)}
.co-kpi .cv.flag{color:var(--amber); font-size:15px; letter-spacing:.06em}
.co-sub{margin-top:6px; font-family:var(--mono); font-size:9.5px; color:var(--lo)}
.co-sec{margin-bottom:26px}
.co-sec .sh{font-family:var(--mono); font-size:9.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--lo); margin-bottom:14px}
.pathbar{display:flex; align-items:center; gap:14px; margin-bottom:11px}
.pathbar .pl{width:110px; font-family:var(--mono); font-size:11px; color:var(--mid); text-transform:uppercase; letter-spacing:.08em}
.pathbar .ptrack{flex:1; height:22px; background:var(--s2); border-radius:5px; overflow:hidden}
.pathbar .pfill{height:100%; border-radius:5px; transition:width .2s ease}
.pathbar .pv{width:110px; text-align:right; font-family:var(--mono); font-size:12px; color:var(--hi)}
.recon{border:1px solid var(--card-line); border-radius:12px; background:var(--s1); overflow:hidden}
.rrow{display:grid; grid-template-columns:88px 1.4fr 1fr 110px 90px 130px; align-items:center; gap:12px; padding:0 16px; height:46px; border-bottom:1px solid var(--row-line); font-size:13px}
.rrow:last-child{border-bottom:none}
.rrow.head span{font-family:var(--mono); font-size:8.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--lo)}
.rrow.head{height:36px; border-bottom:1px solid var(--card-line)}
.rrow .r-id{font-family:var(--mono); font-size:11px; color:var(--mid)}
.rrow .r-g{color:var(--hi)}
.rrow .r-path{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em}
.rrow .r-tab{font-family:var(--mono); font-size:12px; color:var(--hi)}
.rrow .r-take{font-family:var(--mono); font-size:12px; color:var(--amber)}
.rstate{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; padding:4px 9px; border-radius:999px; display:inline-block}
.rstate.rec{background:rgba(52,211,153,.12); color:var(--mint)}
.rstate.open{background:rgba(34,211,238,.12); color:var(--cyan)}
.rstate.none{background:rgba(107,114,128,.15); color:var(--lo)}
.rrow.confirm{background:rgba(52,211,153,.06)}
.rrow.confirm .r-g{color:var(--mint); font-family:var(--mono); font-size:12px; letter-spacing:.06em}
.btn-closeout{margin-top:20px; padding:13px 22px; border-radius:8px; background:var(--mint); color:#04140d; font-size:15px; font-weight:500; transition:filter .12s,transform .05s}
.btn-closeout:hover{filter:brightness(1.06)} .btn-closeout:active{transform:scale(.99)}
.btn-closeout[disabled]{opacity:.5; cursor:default}

.empty-note{padding:40px 20px; text-align:center; color:var(--lo); font-family:var(--mono); font-size:12px; letter-spacing:.06em; border:1px dashed rgba(255,255,255,.12); border-radius:12px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes scan{0%{top:6%}50%{top:92%}100%{top:6%}}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
}
@media (max-width:860px){
  .floor-wrap{flex-direction:column} .aside{width:100%; flex-basis:auto}
  .kpis{display:none}
}
</style>
</head>
<body>
<a class="backlink" href="/deliverables">← DELIVERABLES</a>

<div class="shell">
  <nav class="rail" id="rail" aria-label="Console navigation"></nav>
  <div class="main">
    <header class="header">
      <div>
        <div class="htitle" id="viewTitle">Floor</div>
        <div class="hkick kick" id="viewKick">FLOOR · HOST STAND</div>
      </div>
      <div class="kpis" id="kpis"></div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
"use strict";
/* ── money from integer cents ── */
function money(c){
  if(c===null||c===undefined) return "⚑";
  return "$"+(c/100).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
const HUB={marketing:"marketing",guest:"guest",ops:"ops"};

/* ── tables ── */
const TABLES=[
  {id:"T-01",cap:4,min:80000},  {id:"T-02",cap:4,min:80000},
  {id:"T-03",cap:6,min:120000}, {id:"T-04",cap:6,min:120000},
  {id:"T-05",cap:8,min:180000}, {id:"T-06",cap:8,min:180000},
  {id:"T-07",cap:2,min:50000},  {id:"T-08",cap:4,min:90000},
  {id:"T-09",cap:5,min:250000}, {id:"T-10",cap:10,min:350000},
  {id:"T-11",cap:6,min:150000}, {id:"T-12",cap:8,min:200000}
];
const TMAP={}; TABLES.forEach(t=>TMAP[t.id]=t);

/* ── shared bookings dataset (drives floor + everything) ── */
const BASE_BOOKINGS=[
  {id:"BK-2041",time:"21:30",guest:"Beaulieu",party:5,table:"T-09",min:250000,deposit:60000,
   attr:{label:"@marco.reyes",hub:"marketing"},shares:["locked","locked","locked","failed","failed"],
   depPaid:true,status:"confirmed",tab:0,path:"marketing",flags:["COMP MAGNUM","VIP HOST"]},
  {id:"BK-2042",time:"20:00",guest:"Okafor",party:6,table:"T-03",min:120000,deposit:40000,
   attr:{label:"@lena.voss",hub:"marketing"},shares:["locked","locked","locked"],
   depPaid:true,status:"seated",tab:156500,path:"marketing",flags:["BIRTHDAY"]},
  {id:"BK-2043",time:"22:00",guest:"Salinas",party:8,table:"T-05",min:180000,deposit:50000,
   attr:{label:"HOUSE",hub:"ops"},shares:["locked","pending"],
   depPaid:true,status:"confirmed",tab:0,path:"bookings",flags:[]},
  {id:"BK-2044",time:"19:30",guest:"Petrova",party:2,table:"T-07",min:50000,deposit:20000,
   attr:{label:"VENUE-LINK",hub:"guest"},shares:["locked"],
   depPaid:true,status:"seated",tab:64000,path:"venues",flags:[]},
  {id:"BK-2045",time:"21:00",guest:"Duval",party:4,table:"T-01",min:80000,deposit:20000,
   attr:{label:"@marco.reyes",hub:"marketing"},shares:["locked","pending","pending"],
   depPaid:false,status:"held",tab:0,path:"marketing",flags:["FIRST VISIT"]},
  {id:"BK-2046",time:"23:00",guest:"Ashworth",party:10,table:"T-10",min:350000,deposit:100000,
   attr:{label:"@kingsley",hub:"marketing"},shares:["locked","locked","locked","locked"],
   depPaid:true,status:"confirmed",tab:0,path:"marketing",flags:["COMP MAGNUM","TABLE HOST"]},
  {id:"BK-2047",time:"20:30",guest:"Ramos",party:6,table:"T-11",min:150000,deposit:40000,
   attr:{label:"CREW·NORTH",hub:"ops"},shares:["locked","pending"],
   depPaid:false,status:"held",tab:0,path:"crews",flags:[]},
  {id:"BK-2048",time:"22:30",guest:"Nakamura",party:8,table:"T-06",min:180000,deposit:50000,
   attr:{label:"@lena.voss",hub:"marketing"},shares:["locked","locked","locked"],
   depPaid:true,status:"confirmed",tab:0,path:"marketing",flags:["VIP HOST"]},
  {id:"BK-2049",time:"19:00",guest:"Fenwick",party:4,table:"T-08",min:90000,deposit:20000,
   attr:{label:"VENUE-LINK",hub:"guest"},shares:["locked","locked"],
   depPaid:true,status:"closed",tab:112000,path:"venues",flags:[]},
  {id:"BK-2050",time:"21:45",guest:"Castellano",party:8,table:"T-12",min:200000,deposit:60000,
   attr:{label:"HOUSE",hub:"ops"},shares:["locked","locked"],
   depPaid:true,status:"confirmed",tab:0,path:"bookings",flags:["BIRTHDAY"]},
  {id:"BK-2051",time:"20:15",guest:"Moreau",party:4,table:"T-02",min:80000,deposit:20000,
   attr:{label:"@marco.reyes",hub:"marketing"},shares:["failed"],
   depPaid:false,status:"cancelled",tab:0,path:"marketing",flags:[]},
  {id:"BK-2052",time:"22:15",guest:"Blackwood",party:6,table:"T-04",min:120000,deposit:40000,
   attr:{label:"CREW·SOUTH",hub:"ops"},shares:["locked","pending","pending"],
   depPaid:false,status:"held",tab:0,path:"crews",flags:["FIRST VISIT"]},
  {id:"BK-2053",time:"23:30",guest:"Okonkwo",party:6,table:"T-11",min:150000,deposit:40000,
   attr:{label:"@kingsley",hub:"marketing"},shares:["locked","locked"],
   depPaid:true,status:"confirmed",tab:0,path:"marketing",flags:["COMP BOTTLE"]}
];
/* clone for tab-history table (closed shows real tab even in floor) */

/* ── state ── */
const state={scenario:"live",view:"floor",selectedTable:null,filter:"all",
  bannerDismissed:false,doorSearch:"",closeoutRun:false,bookings:[]};

function loadScenario(){
  if(state.scenario==="live"){
    state.bookings=BASE_BOOKINGS.map(b=>({...b,shares:[...b.shares],flags:[...b.flags]}));
  }else{
    state.bookings=[]; /* NIGHT-1: empty deck */
  }
  state.selectedTable=null; state.closeoutRun=false;
}
loadScenario();

/* active booking on a table (held/confirmed/seated) */
function bookingForTable(id){
  return state.bookings.find(b=>b.table===id && ["held","confirmed","seated"].includes(b.status));
}
function tableState(id){
  const b=bookingForTable(id);
  if(!b) return "available";
  if(b.status==="confirmed" && b.shares.some(s=>s==="failed")) return "blocked";
  return b.status; /* held / confirmed / seated */
}
const STATE_LABEL={available:"Available",held:"Held",confirmed:"Reserved",seated:"Seated",blocked:"Blocked"};

/* blocked booking present? */
function blockedBooking(){
  return state.bookings.find(b=>b.status==="confirmed" && b.shares.some(s=>s==="failed"));
}

/* ── RAIL ── */
function renderRail(){
  const needsAction=state.bookings.filter(b=>b.status==="held" || (b.status==="confirmed"&&b.shares.some(s=>s==="failed"))).length;
  const seated=state.bookings.filter(b=>b.status==="seated").length;
  const arrivals=state.bookings.filter(b=>["held","confirmed"].includes(b.status)).length;
  const closed=state.bookings.filter(b=>["closed","seated"].includes(b.status)).length;
  const counts={floor:seated+"/"+TABLES.length,bookings:state.bookings.filter(b=>b.status!=="cancelled").length,door:arrivals,closeout:closed};
  const items=[["floor","Floor"],["bookings","Bookings"],["door","Door"],["closeout","Closeout"]];
  const now=clockStr();
  document.getElementById("rail").innerHTML=`
    <div class="rail-brand">
      <div class="wm">Atlas</div>
      <div class="kick sub">OPS CONSOLE · v3.1</div>
    </div>
    <div class="scenario">
      <div class="kick lbl">Scenario</div>
      <div class="seg" role="group" aria-label="Scenario">
        <button data-scn="live" aria-pressed="${state.scenario==="live"}">LIVE</button>
        <button data-scn="night1" aria-pressed="${state.scenario==="night1"}">NIGHT-1</button>
      </div>
    </div>
    <div class="rail-nav">
      ${items.map(([k,nm])=>`
        <button class="navitem" data-view="${k}" aria-current="${state.view===k}">
          <span class="nm">${nm}</span><span class="ct">${counts[k]}</span>
        </button>`).join("")}
    </div>
    <div class="rail-foot ${state.scenario==="night1"?"night":""}">
      <div class="venue">Meridian Room</div>
      <div class="clock"><span class="dot"></span>${state.scenario==="live"?"LIVE":"NIGHT-1"} · ${now}</div>
    </div>`;
}

/* ── HEADER ── */
const VIEW_META={
  floor:{t:"Floor",k:"FLOOR · HOST STAND"},
  bookings:{t:"Bookings",k:"RESERVATIONS BOARD"},
  door:{t:"Door",k:"ARRIVALS · CHECK-IN"},
  closeout:{t:"Closeout",k:"END OF NIGHT"}
};
function renderHeader(){
  const m=VIEW_META[state.view];
  document.getElementById("viewTitle").textContent=m.t;
  document.getElementById("viewKick").textContent=m.k;
  const active=state.bookings.filter(b=>["held","confirmed","seated"].includes(b.status));
  const covers=active.reduce((s,b)=>s+b.party,0);
  const committed=active.reduce((s,b)=>s+b.min,0);
  const seated=state.bookings.filter(b=>b.status==="seated").length;
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="kl">Covers Tonight</div><div class="kv">${covers}</div></div>
    <div class="kpi"><div class="kl">Min Committed</div><div class="kv money">${money(committed)}</div></div>
    <div class="kpi"><div class="kl">Seated</div><div class="kv">${seated}</div></div>`;
}

/* ── BANNER ── */
function bannerHTML(){
  if(state.scenario!=="live"||state.bannerDismissed) return "";
  const b=blockedBooking(); if(!b) return "";
  const failed=b.shares.filter(s=>s==="failed").length;
  return `<div class="banner" role="alert">
    <span class="bmsg">⊘ <b>BLOCKING</b> · ${b.table} ${b.guest} — ${failed} of ${b.shares.length} split-pay shares failed</span>
    <span class="bactions">
      <button class="breq" data-act="rerequest">Re-request payment</button>
      <button class="bdis" data-act="dismissbanner">Dismiss</button>
    </span></div>`;
}

/* ── FLOOR ── */
function renderFloor(){
  const cards=TABLES.map(t=>{
    const st=tableState(t.id);
    const b=bookingForTable(t.id);
    const sel=state.selectedTable===t.id?" sel":"";
    return `<button class="tcard ${st}${sel}" data-table="${t.id}">
      <div class="trow">
        <span class="tid">${t.id}</span>
        <span class="tstate st-${st}">${STATE_LABEL[st]}</span>
      </div>
      <div class="tguest ${b?"":"empty"}">${b?b.guest+" · "+b.party:"—"}</div>
      <div class="tcap">CAP ${t.cap} · MIN ${money(t.min)}</div>
    </button>`;
  }).join("");
  return `<div class="floor-wrap">
    <div class="floor-main"><div class="floor-grid">${cards}</div></div>
    <aside class="aside-slot">${asideHTML()}</aside>
  </div>`;
}
function asideHTML(){
  if(state.scenario==="night1"){
    return `<div class="aside empty">▣<br><br>NIGHT-1 · empty deck<br>all tables available</div>`;
  }
  const id=state.selectedTable;
  if(!id){
    return `<div class="aside empty">○<br><br>Select a table<br>to see its detail</div>`;
  }
  const t=TMAP[id], b=bookingForTable(id), st=tableState(id);
  if(!b){
    return `<div class="aside">
      <div class="ahd"><span class="aid">${id}</span><span class="tstate st-available">Available</span></div>
      <div class="aguest" style="color:var(--lo)">No party</div>
      <div class="ameta">CAP ${t.cap} · MIN ${money(t.min)}</div>
      <div class="info-panel" style="background:rgba(255,255,255,.03);border:1px solid var(--card-line);color:var(--mid)">
        <div class="ip-lbl" style="color:var(--lo)">OPEN TABLE</div>
        Table is free. Assign an arriving party from the door list or the bookings board.
      </div>
      ${upNextHTML()}</div>`;
  }
  const dep=`<span class="dots">${b.shares.map(s=>`<span class="dot ${s}"></span>`).join("")}</span>`;
  let action="";
  if(st==="blocked"){
    const failed=b.shares.filter(s=>s==="failed").length;
    action=`<div class="info-panel blocked">
      <div class="ip-lbl">⊘ SPLIT-PAY BLOCKED</div>
      ${failed} of ${b.shares.length} shares failed to capture. Party cannot be seated until resolved.
      <div><button class="ip-btn" data-act="rerequest">Re-request payment</button></div>
    </div>`;
  }else if(st==="seated"){
    action=`<div class="info-panel seated">
      <div class="ip-lbl">● SEATED</div>
      Party is on the floor. Running tab tracks toward the ${money(b.min)} minimum. Close from the tab screen at last call.
    </div>`;
  }else{
    action=`<button class="btn-seat" data-act="seat" data-id="${b.id}">Seat party</button>`;
  }
  return `<div class="aside">
    <div class="ahd"><span class="aid">${id}</span><span class="tstate st-${st}">${STATE_LABEL[st]}</span></div>
    <div class="aguest">${b.guest}</div>
    <div class="ameta">${b.time} · ${b.party} guests · ${b.id}</div>
    <div class="detrows">
      <div class="detrow"><span class="dl">Minimum</span><span class="dv">${money(b.min)}</span></div>
      <div class="detrow"><span class="dl">Deposit</span><span class="dv" style="color:${b.depPaid?"var(--mint)":"var(--lo)"}">${money(b.deposit)}${b.depPaid?" ●":" ○"}</span></div>
      <div class="detrow"><span class="dl">Attribution</span><span class="attrchip ${b.attr.hub}">${b.attr.label}</span></div>
      <div class="detrow"><span class="dl">Split-pay</span>${dep}</div>
    </div>
    ${action}
    ${upNextHTML()}
  </div>`;
}
function upNextHTML(){
  const arr=state.bookings.filter(b=>["held","confirmed"].includes(b.status))
    .sort((a,b)=>a.time.localeCompare(b.time)).slice(0,5);
  if(!arr.length) return "";
  return `<div class="upnext"><div class="un-hd">↓ Up next</div>
    ${arr.map(b=>`<div class="un-row"><span class="un-t">${b.time}</span>
      <span class="un-g">${b.guest}</span><span class="un-p">${b.party}p · ${b.table}</span></div>`).join("")}</div>`;
}

/* ── BOOKINGS ── */
function bookingMatchesFilter(b,f){
  if(f==="all") return true;
  if(f==="action") return b.status==="held"||(b.status==="confirmed"&&b.shares.some(s=>s==="failed"));
  if(f==="confirmed") return b.status==="confirmed";
  if(f==="seated") return b.status==="seated";
  if(f==="done") return b.status==="closed"||b.status==="cancelled";
  return true;
}
function renderBookings(){
  const c={
    all:state.bookings.length,
    action:state.bookings.filter(b=>bookingMatchesFilter(b,"action")).length,
    confirmed:state.bookings.filter(b=>b.status==="confirmed").length,
    seated:state.bookings.filter(b=>b.status==="seated").length,
    done:state.bookings.filter(b=>bookingMatchesFilter(b,"done")).length
  };
  const chipDefs=[["all","All"],["action","Needs action"],["confirmed","Confirmed"],["seated","Seated"],["done","Closed·Cancelled"]];
  const chips=chipDefs.map(([k,nm])=>`<button class="chip" data-filter="${k}" aria-pressed="${state.filter===k}">${nm} <span class="cn">${c[k]}</span></button>`).join("");
  const rows=state.bookings.filter(b=>bookingMatchesFilter(b,state.filter))
    .sort((a,b)=>a.time.localeCompare(b.time)).map(bookingRow).join("");
  const board=state.bookings.length?`
    <div class="board-wrap"><div class="board">
      <div class="brow head"><span>Time</span><span>Guest · Party · Table</span><span>Min</span><span>Attribution</span><span>Payment</span><span>Status</span><span></span></div>
      ${rows||`<div class="brow"><span></span><span class="b-guest"><span class="g" style="color:var(--lo)">No bookings match this filter.</span></span></div>`}
    </div></div>
    <div class="legend">
      <span><span class="k" style="border:1.5px dashed var(--mid)"></span>Held</span>
      <span><span class="k" style="background:var(--cyan)"></span>Confirmed</span>
      <span><span class="k" style="background:var(--mint)"></span>Seated</span>
      <span><span class="k" style="background:var(--lo)"></span>Closed · Cancelled</span>
      <span>DEP ● deposit captured · dots = split-pay shares (mint locked · hollow pending · amber failed)</span>
    </div>`:emptyDeck();
  return `<div class="chips">${chips}</div>${board}`;
}
function bookingRow(b){
  const cx=b.status==="cancelled"?" cx":"";
  const dots=b.shares.map(s=>`<span class="dot ${s}"></span>`).join("");
  let acts="";
  if(b.status==="held"){
    acts=`<button class="ok" data-act="confirm" data-id="${b.id}">Confirm</button><button class="no" data-act="cancel" data-id="${b.id}">Cancel</button>`;
  }else if(b.status==="confirmed"){
    const blocked=b.shares.some(s=>s==="failed");
    acts=`<button class="seat" data-act="seat" data-id="${b.id}" ${blocked?'disabled style="opacity:.4;cursor:default"':""}>Seat</button><button class="no" data-act="cancel" data-id="${b.id}">Cancel</button>`;
  }else if(b.status==="seated"){
    acts=`<button class="done">● On floor</button>`;
  }else if(b.status==="closed"){
    acts=`<button class="done">Closed</button>`;
  }else{
    acts=`<button class="done">Cancelled</button>`;
  }
  const chip=statusChip(b.status);
  return `<div class="brow">
    <span class="b-time">${b.time}</span>
    <span class="b-guest${cx}"><span class="g">${b.guest} · ${b.party} · ${b.table}</span></span>
    <span class="b-min">${money(b.min)}</span>
    <span><span class="attrchip ${b.attr.hub}">${b.attr.label}</span></span>
    <span class="b-pay"><span class="dep ${b.depPaid?"":"no"}">DEP ${b.depPaid?"●":"○"}</span><span class="dots">${dots}</span></span>
    <span>${chip}</span>
    <span class="b-act">${acts}</span>
  </div>`;
}
function statusChip(s){
  if(s==="held") return `<span class="schip held"><span class="hd"></span>Held</span>`;
  if(s==="confirmed") return `<span class="schip confirmed">● Confirmed</span>`;
  if(s==="seated") return `<span class="schip seated">● Seated</span>`;
  if(s==="closed") return `<span class="schip closed">Closed</span>`;
  return `<span class="schip cancelled">Cancelled</span>`;
}

/* ── DOOR ── */
function renderDoor(){
  const q=state.doorSearch.trim().toLowerCase();
  let arr=state.bookings.filter(b=>["held","confirmed","seated"].includes(b.status));
  if(q) arr=arr.filter(b=>b.guest.toLowerCase().includes(q));
  arr.sort((a,b)=>a.time.localeCompare(b.time));
  const rows=arr.map(b=>{
    const meta=`${b.time} · ${b.table} · MIN ${money(b.min)} · ${b.id}`;
    const flags=b.flags.map(f=>`<span class="flagpill">${f}</span>`).join("");
    let right;
    if(b.checkedIn){ right=`<span class="checkedin">● Checked in ${b.checkedIn}</span>`; }
    else if(b.status==="seated"){ right=`<span class="checkedin">● Seated</span>`; }
    else{ right=`<button class="btn-checkin" data-act="checkin" data-id="${b.id}">Check in</button>`; }
    return `<div class="drow">
      <div class="dg"><div class="dn">${b.guest} · ${b.party}</div><div class="dm">${meta}</div>
        ${flags?`<div class="flags" style="margin-top:8px">${flags}</div>`:""}</div>
      ${right}</div>`;
  }).join("");
  const body=state.bookings.length?(rows||`<div class="empty-note">No arrivals match “${state.doorSearch}”.</div>`):emptyDeck();
  return `<div class="door-wrap">
    <button class="scan-tile" data-act="openscan"><span class="gi">▣</span> Scan Wallet pass QR</button>
    <input class="door-search" type="search" placeholder="Search arrivals by name…" value="${state.doorSearch.replace(/"/g,"&quot;")}" data-role="doorsearch" aria-label="Search arrivals">
    ${body}
  </div>`;
}

/* ── CLOSEOUT ── */
const PATH_META={
  venues:{c:"var(--pc-venues)",l:"Venue-link"},
  bookings:{c:"var(--pc-bookings)",l:"House"},
  crews:{c:"var(--pc-crews)",l:"Crews"},
  marketing:{c:"var(--pc-marketing)",l:"Promoters"},
  revenue:{c:"var(--pc-revenue)",l:"Revenue"}
};
function renderCloseout(){
  if(state.scenario==="night1"){
    return zeroCloseout();
  }
  const settled=state.bookings.filter(b=>b.tab>0);
  const totalTab=settled.reduce((s,b)=>s+b.tab,0);
  const bookingsCt=state.bookings.filter(b=>b.status!=="cancelled").length;
  const postVisit=state.bookings.filter(b=>b.status==="closed").length;
  /* tab by path */
  const byPath={};
  settled.forEach(b=>{byPath[b.path]=(byPath[b.path]||0)+b.tab;});
  const maxPath=Math.max(1,...Object.values(byPath));
  const pathBars=Object.keys(byPath).sort((a,b)=>byPath[b]-byPath[a]).map(p=>{
    const m=PATH_META[p]||{c:"var(--electric)",l:p};
    return `<div class="pathbar"><span class="pl">${m.l}</span>
      <span class="ptrack"><span class="pfill" style="width:${(byPath[p]/maxPath*100).toFixed(1)}%;background:${m.c}"></span></span>
      <span class="pv">${money(byPath[p])}</span></div>`;
  }).join("");
  /* reconciliation */
  const recRows=state.bookings.map(b=>{
    let rs,cls;
    if(b.status==="closed"){rs="RECONCILED";cls="rec";}
    else if(b.status==="cancelled"){rs="NO CHARGE";cls="none";}
    else if(b.status==="seated"){rs="OPEN TAB";cls="open";}
    else{rs="OPEN TAB";cls="open";}
    const m=PATH_META[b.path]||{c:"var(--mid)",l:b.path};
    return `<div class="rrow">
      <span class="r-id">${b.id}</span>
      <span class="r-g">${b.guest}</span>
      <span class="r-path" style="color:${m.c}">${m.l}</span>
      <span class="r-tab">${b.tab>0?money(b.tab):"—"}</span>
      <span class="r-take">⚑</span>
      <span><span class="rstate ${cls}">${rs}</span></span>
    </div>`;
  }).join("");
  const confirmRow=state.closeoutRun?`<div class="rrow confirm">
      <span class="r-id">—</span>
      <span class="r-g">● CLOSEOUT RUN · ${clockStr()} · ${bookingsCt} reconciled</span>
      <span></span><span></span><span></span>
      <span><span class="rstate rec">Committed</span></span>
    </div>`:"";
  return `
    <div class="co-kpis">
      <div class="co-kpi"><div class="cl">Bookings</div><div class="cv">${bookingsCt}</div><div class="co-sub">${settled.length} settled</div></div>
      <div class="co-kpi"><div class="cl">Total tab</div><div class="cv money">${money(totalTab)}</div><div class="co-sub">from integer cents</div></div>
      <div class="co-kpi"><div class="cl">Platform take</div><div class="cv flag">⚑ RATE PLACEHOLDER</div><div class="co-sub">venue reporting only</div></div>
      <div class="co-kpi"><div class="cl">Post-visit sent</div><div class="cv">${postVisit}</div><div class="co-sub">A-List credit offers</div></div>
    </div>
    <div class="co-sec"><div class="sh">Tab by path</div>${pathBars||`<div class="empty-note">No settled tabs yet.</div>`}</div>
    <div class="co-sec"><div class="sh">Reconciliation</div>
      <div class="recon">
        <div class="rrow head"><span>ID</span><span>Guest</span><span>Path</span><span>Tab</span><span>Take</span><span>State</span></div>
        ${recRows}${confirmRow}
      </div>
      <button class="btn-closeout" data-act="runcloseout" ${state.closeoutRun?"disabled":""}>${state.closeoutRun?"Closeout committed":"Run closeout"}</button>
    </div>`;
}
function zeroCloseout(){
  return `
    <div class="co-kpis">
      <div class="co-kpi"><div class="cl">Bookings</div><div class="cv">0</div><div class="co-sub">night-1 deck</div></div>
      <div class="co-kpi"><div class="cl">Total tab</div><div class="cv money">${money(0)}</div><div class="co-sub">from integer cents</div></div>
      <div class="co-kpi"><div class="cl">Platform take</div><div class="cv flag">⚑ RATE PLACEHOLDER</div><div class="co-sub">venue reporting only</div></div>
      <div class="co-kpi"><div class="cl">Post-visit sent</div><div class="cv">0</div><div class="co-sub">A-List credit offers</div></div>
    </div>
    <div class="co-sec"><div class="sh">Tab by path</div><div class="empty-note">Night-1 · no settled tabs.</div></div>
    <div class="co-sec"><div class="sh">Reconciliation</div><div class="empty-note">No bookings on the deck yet.</div></div>`;
}
function emptyDeck(){
  return `<div class="empty-note">NIGHT-1 · empty booking deck. Flip the scenario to LIVE to load Meridian Room.</div>`;
}

/* ── SCAN OVERLAY ── */
function openScan(){
  const s=document.createElement("div");
  s.className="scrim"; s.id="scanScrim"; s.setAttribute("role","dialog"); s.setAttribute("aria-label","Scan Wallet pass");
  s.innerHTML=`
    <div class="stxt">▣ Scan Wallet pass QR</div>
    <div class="qr-target">
      <span class="qr-corner tl"></span><span class="qr-corner tr"></span>
      <span class="qr-corner bl"></span><span class="qr-corner br"></span>
      <span class="scanline"></span>
    </div>
    <div class="shint">Tap anywhere to dismiss</div>`;
  s.addEventListener("click",()=>s.remove());
  document.body.appendChild(s);
}

/* ── VIEW DISPATCH ── */
function renderContent(){
  const c=document.getElementById("content");
  let v="";
  if(state.view==="floor") v=renderFloor();
  else if(state.view==="bookings") v=renderBookings();
  else if(state.view==="door") v=renderDoor();
  else if(state.view==="closeout") v=renderCloseout();
  c.innerHTML=bannerHTML()+v;
}
function render(){renderRail();renderHeader();renderContent();}

/* ── MUTATIONS ── */
function byId(id){return state.bookings.find(b=>b.id===id);}
function seatParty(id){const b=byId(id); if(b&&b.status==="confirmed"&&!b.shares.some(s=>s==="failed")){b.status="seated"; b.tab=b.tab||Math.round(b.min*(0.9+Math.random()*0.4));} }
function confirmBooking(id){const b=byId(id); if(b&&b.status==="held"){b.status="confirmed"; b.depPaid=true; b.shares=b.shares.map(s=>s==="pending"?"locked":s);} }
function cancelBooking(id){const b=byId(id); if(b){b.status="cancelled"; if(state.selectedTable===b.table)state.selectedTable=b.table;} }
function checkIn(id){const b=byId(id); if(b&&!b.checkedIn){b.checkedIn=clockStr();} }
function reRequest(){const b=blockedBooking(); if(b){b.shares=b.shares.map(s=>s==="failed"?"pending":s);} }

/* ── EVENTS ── */
document.addEventListener("click",e=>{
  const rail=e.target.closest("[data-view]");
  if(rail){state.view=rail.dataset.view; render(); return;}
  const scn=e.target.closest("[data-scn]");
  if(scn){state.scenario=scn.dataset.scn; state.bannerDismissed=false; loadScenario(); render(); return;}
  const table=e.target.closest("[data-table]");
  if(table){state.selectedTable=table.dataset.table; render(); return;}
  const chip=e.target.closest("[data-filter]");
  if(chip){state.filter=chip.dataset.filter; render(); return;}
  const act=e.target.closest("[data-act]");
  if(act){
    const a=act.dataset.act, id=act.dataset.id;
    if(a==="seat"){seatParty(id);}
    else if(a==="confirm"){confirmBooking(id);}
    else if(a==="cancel"){cancelBooking(id);}
    else if(a==="checkin"){checkIn(id);}
    else if(a==="rerequest"){reRequest();}
    else if(a==="dismissbanner"){state.bannerDismissed=true;}
    else if(a==="runcloseout"){state.closeoutRun=true;}
    else if(a==="openscan"){openScan(); return;}
    render(); return;
  }
});
document.addEventListener("input",e=>{
  const ds=e.target.closest('[data-role="doorsearch"]');
  if(ds){
    state.doorSearch=ds.value;
    /* re-render door body only to preserve focus */
    renderContent();
    const inp=document.querySelector('[data-role="doorsearch"]');
    if(inp){inp.focus(); const v=inp.value; inp.setSelectionRange(v.length,v.length);}
  }
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){const s=document.getElementById("scanScrim"); if(s)s.remove();}
});

/* ── CLOCK (live-ish) ── */
let clockSec=21*3600+47*60+12;
function clockStr(){
  const h=Math.floor(clockSec/3600)%24, m=Math.floor(clockSec/60)%60, s=clockSec%60;
  const p=n=>String(n).padStart(2,"0");
  return p(h)+":"+p(m)+":"+p(s);
}
function tickClock(){
  clockSec++;
  const el=document.querySelector(".rail-foot .clock");
  if(el){const dot=el.querySelector(".dot"); el.innerHTML=(dot?dot.outerHTML:"")+(state.scenario==="live"?"LIVE":"NIGHT-1")+" · "+clockStr();}
}
if(!window.matchMedia||!window.matchMedia("(prefers-reduced-motion: reduce)").matches){
  setInterval(tickClock,1000);
}

render();
</script>
</body>
</html>
